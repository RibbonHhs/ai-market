name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 后端 / 前端互相独立，可并行；任一失败即 fail PR
jobs:
  backend-build:
    name: backend (mvn verify, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Build & verify
        working-directory: backend
        run: ./mvnw -B -e -ntp clean verify

  frontend-build:
    name: frontend (npm ci + build, Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type-check & build
        working-directory: frontend
        run: npm run build
