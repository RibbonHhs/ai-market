# 生产编排：MySQL + Backend + Frontend，资源限制 + 真实密钥 + 健康检查
# 启动：docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
# 注：本文件与 dev 用 docker-compose.yml 并存；dev 文件保持不动。
#      prod 通过 -f 叠加，仅覆盖本文件定义的字段，env 由 .env.prod 注入。
version: '3.8'

services:
  mysql:
    image: mysql:8.3.0
    container_name: skillsmap-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skillsmap}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-connections=512
      - --innodb-buffer-pool-size=1G
    volumes:
      - mysql_data:/var/lib/mysql
      # 自定义 MySQL 配置（可选）：将 *.cnf 放到 deploy/mysql/conf/ 下
      - ./deploy/mysql/conf:/etc/mysql/conf.d:ro
    # 容器内访问，不暴露 3306 到宿主机（减少攻击面）
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - skillsmap-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: skills-map-backend:${TAG:-1.0.0}
    container_name: skillsmap-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8767
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_PATH: /app/logs
      # 关闭 prod seed（避免重启时反复扫描）
      SKILLSMAP_SEED_ENABLED: "false"
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
      TZ: Asia/Shanghai
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
    expose:
      - "8767"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8767/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1.5G
    networks:
      - skillsmap-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: skills-map-frontend:${TAG:-1.0.0}
    container_name: skillsmap-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-7777}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - skillsmap-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  mysql_data:
    name: skillsmap_mysql_data
  backend_logs:
    name: skillsmap_backend_logs
  backend_data:
    name: skillsmap_backend_data

networks:
  skillsmap-net:
    name: skillsmap_net
    driver: bridge
