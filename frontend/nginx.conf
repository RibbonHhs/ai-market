server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "0" always;
    # 如上游有 TLS，可加 HSTS：
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== 隐藏 nginx 版本 =====
    server_tokens off;

    # ===== 限流（防 CC） =====
    # api 路径 30r/s 突发 60；其他 10r/s 突发 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
    limit_req_status 429;

    # ===== SPA fallback =====
    location / {
        limit_req zone=general_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ===== 后端 API 反代 =====
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://backend:8767/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    # ===== 文档（生产直接 404，避免暴露 API 契约） =====
    location = /doc.html        { return 404; }
    location = /swagger-ui.html { return 404; }
    location /swagger-ui/       { return 404; }
    location = /v3/api-docs     { return 404; }
    location /v3/api-docs/      { return 404; }
    location /webjars/          { return 404; }

    # ===== 静态资源缓存 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # ===== 禁止访问隐藏文件（.git / .env / .htaccess 等） =====
    location ~ /\.(?!well-known) { deny all; }
}
